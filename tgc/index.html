<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TGC - 幻獣カード図鑑プロトタイプ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=tgc-card-focus-20260614">
    <script src="data/cards.js?v=tgc-card-focus-20260614" defer></script>
    <script src="app.js?v=tgc-card-focus-20260614" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="title-block">
          <p class="kicker">ARCANE BESTIARY</p>
          <h1>幻獣召喚</h1>
        </div>
        <div class="topbar-actions">
          <div class="collection-rate" id="collectionRate" aria-live="polite">
            <span class="rate-label">所持率</span>
            <strong>0 / 0</strong>
          </div>
          <button class="primary-button" id="openPackButton" type="button">5枚パックを開ける</button>
          <button class="ghost-button" id="resetButton" type="button">リセット</button>
        </div>
      </header>

      <main class="library-layout">
        <aside class="filter-panel" aria-label="カードタイプフィルタ">
          <h2>カードタイプ</h2>
          <div class="filter-list" id="filterList">
            <button class="filter-button is-active" type="button" data-filter="all">すべて</button>
            <button class="filter-button" type="button" data-filter="monster">幻獣</button>
            <button class="filter-button" type="button" data-filter="aura">オーラ</button>
            <button class="filter-button" type="button" data-filter="sorcery">ソーサリー</button>
            <button class="filter-button" type="button" data-filter="item">アイテム</button>
          </div>
        </aside>

        <section class="card-section" aria-label="カード一覧">
          <div class="section-heading">
            <h2>コレクション</h2>
            <p id="visibleCount">0枚表示</p>
          </div>
          <div class="card-grid" id="cardGrid"></div>
          <section class="battle-menu" id="battleMenu" aria-label="対戦メニュー">
            <div>
              <p class="kicker">Battle Menu</p>
              <h2>召喚盤で対戦</h2>
              <p>標準デッキで、カードを手札として構えながら盤上に幻獣を召喚します。</p>
            </div>
            <div class="battle-menu-actions">
              <button class="primary-button" id="startBattleButton" type="button">標準デッキで開始</button>
              <button class="ghost-button" id="previewBattleButton" type="button">戦闘画面を見る</button>
            </div>
          </section>
        </section>
      </main>
    </div>

    <section class="battle-scene" id="battleScene" aria-hidden="true" aria-label="戦闘画面">
      <div class="battle-shell">
        <header class="battle-topbar">
          <div>
            <p class="kicker">Summon Board</p>
            <h2>幻獣召喚戦</h2>
          </div>
          <div class="battle-hud">
            <span id="battleTurnLabel">後手 Turn 1</span>
            <span id="battleManaLabel">Mana 2/2</span>
            <span id="battleLifeLabel">Life 20 - 20</span>
          </div>
          <div class="battle-actions">
            <button class="ghost-button" id="backToCollectionButton" type="button">カード一覧</button>
            <button class="primary-button" id="endBattleTurnButton" type="button">ターン終了</button>
          </div>
        </header>

        <div class="battle-table">
          <div class="opponent-hero">
            <span>対戦相手</span>
            <strong id="enemyLifeLabel">20</strong>
          </div>
          <div class="battle-board-wrap">
            <div class="battle-board" id="battleBoard" aria-label="召喚盤"></div>
          </div>
          <div class="player-hero">
            <span>あなた</span>
            <strong id="playerLifeLabel">20</strong>
          </div>
        </div>

        <div class="battle-hand-zone" aria-label="手札">
          <div class="battle-hand" id="battleHand"></div>
        </div>
      </div>
    </section>

    <div class="modal" id="packModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="packModalTitle">
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-card">
        <div class="modal-header">
          <p class="kicker">Arcane Pack</p>
          <h2 id="packModalTitle">パック開封</h2>
        </div>
        <div class="pack-stage" id="packStage"></div>
        <div class="modal-actions">
          <button class="primary-button" id="openAnotherButton" type="button">もう一度5枚開ける</button>
          <button class="ghost-button" id="closeModalButton" type="button">閉じる</button>
        </div>
      </div>
    </div>

    <div class="modal card-viewer-modal" id="cardViewerModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="cardViewerTitle">
      <div class="modal-backdrop" data-close-viewer></div>
      <div class="modal-card card-viewer-shell">
        <div class="modal-header">
          <p class="kicker">Card View</p>
          <h2 id="cardViewerTitle">カード観察</h2>
        </div>
        <div class="card-viewer-stage" id="cardViewerStage"></div>
        <div class="modal-actions">
          <button class="ghost-button" id="closeViewerButton" type="button">閉じる</button>
        </div>
      </div>
    </div>
  </body>
</html>
