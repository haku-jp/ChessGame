<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TGC - 幻獣カード図鑑プロトタイプ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=tgc-main-menu-84c7144">
    <script src="data/cards.js?v=tgc-card-focus-20260614" defer></script>
    <script src="src/game/rules.js?v=genju-board-20260615" defer></script>
    <script src="src/game/battle.js?v=genju-board-20260615" defer></script>
    <script src="app.js?v=tgc-main-menu-84c7144" defer></script>
    <script src="battle-demo.js?v=genju-board-20260615" defer></script>
  </head>
  <body>
    <section class="main-menu" id="mainMenu" aria-label="メインメニュー">
      <div class="main-menu-shell">
        <div class="main-menu-brand">
          <p class="kicker">Arcane Bestiary</p>
          <h1>幻獣召喚</h1>
          <p>デッキを構え、召喚盤で戦い、カードを集める。</p>
        </div>
        <nav class="main-menu-nav" aria-label="ゲームモード">
          <button class="menu-tile menu-tile-primary" id="menuBattleButton" type="button">
            <span>対戦</span>
            <strong>標準デッキで開始</strong>
          </button>
          <button class="menu-tile" id="menuCollectionButton" type="button">
            <span>コレクション</span>
            <strong>カード一覧</strong>
          </button>
          <button class="menu-tile" id="menuPackButton" type="button">
            <span>パック</span>
            <strong>5枚パックを開ける</strong>
          </button>
        </nav>
      </div>
    </section>

    <div class="app-shell" hidden>
      <header class="topbar">
        <div class="title-block">
          <p class="kicker">ARCANE BESTIARY</p>
          <h1>幻獣召喚</h1>
        </div>
        <div class="topbar-actions">
          <div class="collection-rate" id="collectionRate" aria-live="polite">
            <span class="rate-label">所持率</span>
            <strong>0 / 0</strong>
          </div>
          <button class="primary-button" id="openPackButton" type="button">5枚パックを開ける</button>
          <button class="ghost-button" id="resetButton" type="button">リセット</button>
        </div>
      </header>

      <main class="library-layout" id="collectionScene">
        <aside class="filter-panel" aria-label="カードタイプフィルタ">
          <h2>カードタイプ</h2>
          <div class="filter-list" id="filterList">
            <button class="filter-button is-active" type="button" data-filter="all">すべて</button>
            <button class="filter-button" type="button" data-filter="genju">幻獣</button>
            <button class="filter-button" type="button" data-filter="spell">魔術</button>
            <button class="filter-button" type="button" data-filter="equipment">装備</button>
          </div>
        </aside>

        <section class="card-section" aria-label="カード一覧">
          <div class="section-heading">
            <h2>コレクション</h2>
            <p id="visibleCount">0枚表示</p>
          </div>
          <div class="card-grid" id="cardGrid"></div>
        </section>
      </main>

      <section class="battle-demo" id="battleScene" aria-label="召喚盤デモ" hidden>
        <div class="battle-header">
          <div>
            <p class="kicker">Guild Trial Board</p>
            <h2>6x6召喚盤</h2>
          </div>
          <div class="battle-actions">
            <button class="primary-button" id="battleNewGameButton" type="button">標準デッキで開始</button>
            <button class="ghost-button" id="battleEndTurnButton" type="button">ターン終了</button>
          </div>
        </div>

        <div class="battle-status" id="battleStatus" aria-live="polite"></div>

        <div class="battle-layout">
          <div class="battle-board" id="battleBoard" aria-label="6x6召喚盤"></div>
          <aside class="battle-side">
            <h3>手札</h3>
            <div class="battle-hand" id="battleHand"></div>
            <h3>ログ</h3>
            <ol class="battle-log" id="battleLog"></ol>
          </aside>
        </div>
      </section>
    </div>

    <div class="modal" id="packModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="packModalTitle">
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-card">
        <div class="modal-header">
          <p class="kicker">Arcane Pack</p>
          <h2 id="packModalTitle">パック開封</h2>
        </div>
        <div class="pack-stage" id="packStage"></div>
        <div class="modal-actions">
          <button class="primary-button" id="openAnotherButton" type="button">もう一度5枚開ける</button>
          <button class="ghost-button" id="closeModalButton" type="button">閉じる</button>
        </div>
      </div>
    </div>

    <div class="modal card-viewer-modal" id="cardViewerModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="cardViewerTitle">
      <div class="modal-backdrop" data-close-viewer></div>
      <div class="modal-card card-viewer-shell">
        <div class="modal-header">
          <p class="kicker">Card View</p>
          <h2 id="cardViewerTitle">カード観察</h2>
        </div>
        <div class="card-viewer-stage" id="cardViewerStage"></div>
        <div class="modal-actions">
          <button class="ghost-button" id="closeViewerButton" type="button">閉じる</button>
        </div>
      </div>
    </div>
  </body>
</html>
